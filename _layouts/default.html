<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    {% include nav.html %}
    <main class="page-content">
      {{ content }}
    </main>
    {% include footer.html %}
    {% if page.layout == 'publications' %}
    <script src="{{ '/assets/js/publications.js' | relative_url }}"></script>
    {% endif %}
    {% if page.layout == 'post' or page.url contains 'blog' %}
    <script src="{{ '/assets/js/blog-filter.js' | relative_url }}"></script>
    {% endif %}
  </body>
</html>
